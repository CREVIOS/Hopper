syntax = "proto3";

package hopper.billing.v1;

option go_package = "github.com/hopper/orchestrator/api/proto/billing/v1;billingv1";

import "google/protobuf/timestamp.proto";

service BillingService {
  rpc DeductCredits(DeductRequest) returns (DeductResponse);
  rpc GetBalance(AccountId) returns (BalanceResponse);
  rpc StreamUsage(AccountId) returns (stream UsageEvent);
}

message AccountId {
  string id = 1;
}

message DeductRequest {
  string account_id = 1;
  double amount = 2;
  string reason = 3;
  string pod_id = 4;
  string gpu_tier = 5;
}

message DeductResponse {
  bool success = 1;
  double remaining_balance = 2;
  string message = 3;
}

message BalanceResponse {
  string account_id = 1;
  double balance = 2;
  google.protobuf.Timestamp as_of = 3;
}

message UsageEvent {
  string account_id = 1;
  double amount = 2;
  string type = 3;
  string pod_id = 4;
  google.protobuf.Timestamp timestamp = 5;
}
