apiVersion: v1
kind: ServiceAccount
metadata:
  name: hopper-orchestrator
  namespace: hopper-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hopper-orchestrator
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hopper-orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hopper-orchestrator
subjects:
  - kind: ServiceAccount
    name: hopper-orchestrator
    namespace: hopper-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hopper-api-gateway
  namespace: hopper-system
