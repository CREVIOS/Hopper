apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hopper-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/hopper.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: hopper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
